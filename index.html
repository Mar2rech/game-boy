<div class="gameboy">
  <div class="body-upper">
    <div class="screen-housing">
      <div class="dot-matrix-row">
        <div class="deco-lines">
          <div class="deco-line-pink"></div>
          <div class="deco-line-blue"></div>
        </div>
        <span class="dot-matrix-label">DOT MATRIX WITH STEREO SOUND</span>
        <div class="deco-lines">
          <div class="deco-line-pink"></div>
          <div class="deco-line-blue"></div>
        </div>
      </div>
      <div class="screen-inner">
        <div class="battery-indicator">
          <div class="battery-dot"></div>
          <span class="battery-text">BATTERY</span>
        </div>
        <div class="screen">
          <div class="screen-content">
            <div class="screen-title">
              <span>G</span><span>A</span><span>M</span><span>E</span>
              <span>B</span><span>O</span><span>Y</span>
            </div>
            <div class="screen-bar-wrap">
              <div class="screen-bar"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="logo-row">
      <span class="logo-nintendo">Nintendo</span>
      <span class="logo-gameboy">GAME BOY</span>
      <span class="logo-tm">™</span>
    </div>
  </div>

  <div class="body-lower">
    <div class="controls-row">
      <div class="dpad-wrap">
        <div class="dpad-arm dpad-h"></div>
        <div class="dpad-arm dpad-v"></div>
        <div class="dpad-centre"></div>
      </div>

      <div class="ab-group">
        <div class="ab-row">
          <div class="button-ab-wrap button-b-offset">
            <div class="button-ab"></div>
            <span class="button-ab-label">B</span>
          </div>
          <div class="button-ab-wrap">
            <div class="button-ab"></div>
            <span class="button-ab-label">A</span>
          </div>
        </div>
      </div>
    </div>

    <div class="select-start-row">
      <div class="button-small-wrap">
        <div class="button-small"></div>
        <span class="button-small-label">SELECT</span>
      </div>
      <div class="button-small-wrap">
        <div class="button-small"></div>
        <span class="button-small-label">START</span>
      </div>
    </div>

    <div class="speaker-slits">
      <div class="slit"></div>
      <div class="slit"></div>
      <div class="slit"></div>
      <div class="slit"></div>
      <div class="slit"></div>
      <div class="slit"></div>
    </div>
  </div>
</div>
